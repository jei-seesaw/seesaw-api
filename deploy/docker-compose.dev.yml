services:
  api:
    image: ${IMAGE:?IMAGE is required}
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "${HOST_BIND:-127.0.0.1}:${HOST_PORT:-9093}:${PORT:-9093}"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "const port = process.env.PORT || '9093'; fetch(`http://127.0.0.1:$${port}/api/v2/health`).then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1));"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  mariadb:
    image: mariadb:11
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      MARIADB_DATABASE: ${DB_NAME:?DB_NAME is required}
      MARIADB_USER: ${DB_USER:?DB_USER is required}
      MARIADB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?MARIADB_ROOT_PASSWORD is required}
    ports:
      - "${DB_HOST_BIND:-127.0.0.1}:${DB_HOST_PORT:-3307}:3306"
    volumes:
      - mariadb-data:/var/lib/mysql

volumes:
  mariadb-data:
