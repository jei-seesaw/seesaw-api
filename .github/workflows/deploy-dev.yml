name: Deploy Dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: seesaw-api-dev
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '24'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build

  build-and-push:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_REPOSITORY }}:main
            ${{ secrets.DOCKERHUB_REPOSITORY }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v7
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519 ~/.ssh/known_hosts
      - name: Deploy over SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_DEPLOY_PATH: ${{ secrets.SSH_DEPLOY_PATH }}
          DOCKERHUB_REPOSITORY: ${{ secrets.DOCKERHUB_REPOSITORY }}
        run: |
          set -euo pipefail

          remote="$SSH_USER@$SSH_HOST"
          ssh_args=(-i ~/.ssh/id_ed25519 -p "$SSH_PORT" -o UserKnownHostsFile=~/.ssh/known_hosts)

          ssh "${ssh_args[@]}" "$remote" "mkdir -p '$SSH_DEPLOY_PATH'"
          scp -P "$SSH_PORT" -i ~/.ssh/id_ed25519 -o UserKnownHostsFile=~/.ssh/known_hosts \
            deploy/docker-compose.dev.yml "$remote:$SSH_DEPLOY_PATH/docker-compose.yml"

          ssh "${ssh_args[@]}" "$remote" "DEPLOY_PATH='$SSH_DEPLOY_PATH' IMAGE='$DOCKERHUB_REPOSITORY:main' sh -se" <<'REMOTE'
          cd "$DEPLOY_PATH"
          test -f .env || { echo "$DEPLOY_PATH/.env is missing"; exit 1; }
          if grep -q '^IMAGE=' .env; then
            sed -i "s|^IMAGE=.*|IMAGE=$IMAGE|" .env
          else
            printf '\nIMAGE=%s\n' "$IMAGE" >> .env
          fi
          docker compose config >/dev/null
          docker compose pull api
          docker compose up -d --wait mariadb
          docker compose run --rm api node dist/config/run-migrations.js
          docker compose up -d --wait --remove-orphans api
          docker compose ps
          REMOTE
